name: Publish npm package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm
        run: npm install -g npm@11.10.1

      - name: Show Node and npm versions
        run: |
          node --version
          npm --version

      - name: Verify npm package version matches tag
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PKG_VERSION="$(node -p "require('./packages/npm/package.json').version")"
          if [ "v${PKG_VERSION}" != "${TAG}" ]; then
            echo "Tag ${TAG} does not match packages/npm/package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Publish @small-protocol/small via npm Trusted Publishing (OIDC)
        working-directory: packages/npm
        run: npm publish --provenance --access public
